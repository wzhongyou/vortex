name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        build_type: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DVORTEX_BUILD_TESTS=ON -DVORTEX_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test (inverted index only)
        run: cd build && ctest --output-on-failure -R "IntegrationTest|ArenaTest|PostingCodec|SkipList|TermDict|ForwardIndex|BM25FScorer|StandardTokenizer|CJK|LowercaseFilter|StopwordFilter|AnalyzerTest|DeleteBitmap|ExternalIdMap|WALTest"

      - name: Run example
        run: ./build/examples/vortex_example /tmp/vortex_demo